{% extends 'edit/base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h2>{% if form.instance.pk %}メモを編集{% else %}新規作成{% endif %}</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    <!-- ここでBootstrapのクラスを追加 -->
                    <div class="form-control-wrapper">
                        {{ field }}
                    </div>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">保存する</button>
            <a href="{% url 'memo_list' %}" class="btn btn-secondary">キャンセル</a>
        </form>
    </div>
</div>

<style>
    /* 簡易的に入力欄をBootstrap風にするCSS */
    input, textarea { width: 100%; border: 1px solid #ced4da; border-radius: 0.375rem; padding: 0.375rem 0.75rem; }
</style>
{% endblock %}
